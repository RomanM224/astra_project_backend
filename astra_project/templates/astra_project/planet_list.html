{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planets of the Astra Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'astra_project/css/style.css' %}">
</head>

<body class="body-planet-bg">
    {% include 'astra_project/header.html' %}
    <main class="container my-5">

        <div class="container">
            <h1 class="text-center mb-5 fw-bold">Planets</h1>

            <div class="row g-4">
                {% for planet in planets %}
                <div class="col-lg-4 col-md-6">
                    <div class="card planet-card p-3">
                        <img src="{% static 'images/planets/' %}{{ planet.pictureUrl }}" class="planet-img" alt="Меркурий">
                        <div class="card-body">
                            <h3 class="card-title text-center mb-3">{{ planet.name }}</h3>
                            <p class="card-text">{{ planet.description}}</p>
                            <hr class="border-secondary">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="stat-label">Size (km)</span>
                                <span class="stat-value">{{ planet.size }}</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="stat-label">Distance to Star (km)</span>
                                <span class="stat-value">{{planet.distance }}</span>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>
    {% include 'astra_project/footer.html' %}
</body>
</html>
