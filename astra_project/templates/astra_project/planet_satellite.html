{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Satellite to Planet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'astra_project/css/style.css' %}">
</head>

<body class="body-planet-bg">
    {% include 'astra_project/header.html' %}
    <main class="container my-5">
        <div class="container">
            <h1 class="text-center mb-5 fw-bold">Add Satellite to Planet</h1>
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card planet-card p-4">
                        <form method="post">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary w-100 mt-3">Save Relationship</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    {% include 'astra_project/footer.html' %}
</body>

</html>
