{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        nav {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1em;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #aaa;
        }

        #planet-buttons {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        #planet-buttons button {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            margin: 0 5px;
            border-radius: 15px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #planet-buttons button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #info-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: none;
            /* Hidden by default */
            z-index: 2;
        }

        #info-panel h2 {
            margin-top: 0;
        }

        #info-panel #close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-size: 1.2em;
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{% static 'astra_project/css/style.css' %}">
</head>

<body>
    {% include 'astra_project/header.html' %}
    <div id="planet-buttons"></div>
    <!-- <div id="info-panel">
        <span id="close-btn">✖</span>
        <h2 id="planet-name"></h2>
        <p id="planet-description"></p>
    </div> -->
    <script>
        window.starData = {{ star_data_json|safe }};
        window.planetData = {{ planet_data_json|safe }};
        window.satelliteData = {{ satellite_data_json|safe }};
        window.starPlanetData = {{ star_planet_data_json|safe }};
        window.planetSatelliteData = {{ planet_satellite_data_json|safe }};
    </script>
    <script type="module" src="{% static 'astra_project/js/main.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>

</html>
